name: Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/hexze/coral

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            git_auth_token=${{ secrets.PRIVATE_REPO_TOKEN }}

  package:
    needs: compile
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        target: [coral-api, coral-bot, coral-admin, coral-verify, coral-postgres]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.target }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.target }}:${{ github.sha }}
          cache-from: type=gha
          secrets: |
            git_auth_token=${{ secrets.PRIVATE_REPO_TOKEN }}

  deploy:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer redeploy
        run: |
          response=$(curl -s -L -w "\nHTTP_CODE:%{http_code}" -X POST \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            "${{ secrets.PORTAINER_WEBHOOK }}")
          echo "$response"
          http_code=$(echo "$response" | grep "HTTP_CODE:" | cut -d: -f2)
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Webhook failed with HTTP $http_code"
            exit 1
          fi
