[workspace]
resolver = "2"
members = [
    "crates/hypixel",
    "crates/blacklist",
    "crates/clients",
    "crates/database",
    "crates/render",
    "crates/coral-api",
    "crates/coral-admin",
    "crates/migration",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Hexze"]
license = "MIT"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# HTTP client
reqwest = { version = "0.12", features = ["json"] }

# Web framework
axum = { version = "0.8", features = ["macros"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace"] }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "json", "chrono", "uuid"] }

# Image rendering
image = "0.25"
mctext = "1.3.2"

# Utilities
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenvy = "0.15"

# MongoDB (for migration only)
mongodb = "3"

# Internal crates
hypixel = { path = "crates/hypixel" }
blacklist = { path = "crates/blacklist" }
clients = { path = "crates/clients" }
database = { path = "crates/database" }
render = { path = "crates/render" }
